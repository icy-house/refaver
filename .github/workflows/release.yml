name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# Force all Node-based actions onto Node 24 (some still declare Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-cli:
    name: Build + publish CLI (Phase 1, $0 ad-hoc)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The git tag is the single source of truth for the version. Stamp it into
      # the package so all artifacts (sdist/wheel/.pyz) are named to match.
      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python - "$VERSION" <<'PY'
          import pathlib, re, sys
          v = sys.argv[1]
          pp = pathlib.Path("pyproject.toml")
          pp.write_text(re.sub(r'(?m)^version = ".*"', f'version = "{v}"', pp.read_text()))
          init = pathlib.Path("refaver/__init__.py")
          init.write_text(re.sub(r'__version__ = ".*"', f'__version__ = "{v}"', init.read_text()))
          print("stamped version", v)
          PY

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build standalone zipapp (.pyz)
        run: ../packaging/build-pyz.sh "$PWD/dist"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/*   # sdist, wheel, and refaver-<version>.pyz
          generate_release_notes: true

  bump-tap:
    name: Bump Homebrew tap formula
    needs: release-cli
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: gate
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping automatic tap bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v5   # this repo, for the updater script

      - if: steps.gate.outputs.skip != 'true'
        name: Compute version + sha256 from the released .pyz
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL -o refaver.pyz \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/refaver-${VERSION}.pyz"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA=$(sha256sum refaver.pyz | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - if: steps.gate.outputs.skip != 'true'
        name: Checkout the tap repo
        uses: actions/checkout@v5
        with:
          repository: icy-house/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}   # PAT with write access to the tap
          path: tap

      - if: steps.gate.outputs.skip != 'true'
        name: Update the formula (version + url + sha256)
        run: ./packaging/update-tap-formula.sh "$VERSION" "$SHA" tap/Formula/refaver.rb

      - if: steps.gate.outputs.skip != 'true'
        name: Commit + push the tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then echo "formula already up to date"; exit 0; fi
          git add Formula/refaver.rb
          git commit -m "refaver ${VERSION}"
          git push


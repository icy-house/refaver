name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-cli:
    name: Build + publish CLI (Phase 1, $0 ad-hoc)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build standalone zipapp (.pyz)
        run: ../packaging/build-pyz.sh "$PWD/dist"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/*   # sdist, wheel, and refaver-<version>.pyz
          generate_release_notes: true

      # TODO(homebrew): bump the formula in the tap repo with the new sha256.
      # Requires a HOMEBREW_TAP_TOKEN secret with write access to the tap.


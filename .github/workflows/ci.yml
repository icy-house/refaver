name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + type + test
    runs-on: macos-latest  # refaver is macOS-only
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tooling
        run: python -m pip install --upgrade pip ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        run: mypy refaver

      - name: Pytest
        run: pytest -q
